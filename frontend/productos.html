<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SDN - Inventario de Productos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: #f5f0e8; display: flex; min-height: 100vh; }
    .sidebar {
        width: 280px;
        background: #1a1a1a;
        color: #f5f0e8;
        padding: 25px;
        display: flex;
        flex-direction: column;
        position: fixed;
        height: 100vh;
        overflow-y: auto;
        z-index: 100;
        border-right: 4px solid #2e7d32;
    }
    .logo { font-size: 34px; font-weight: 800; color: #d9b382; margin-bottom: 40px; }
    .logo span { color: #2e7d32; }
    .nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
    .nav-btn {
        background: transparent; border: none; color: #ccc; padding: 14px 18px;
        border-radius: 12px; text-align: left; cursor: pointer; font-size: 15px;
        font-weight: 500; display: flex; align-items: center; gap: 12px;
    }
    .nav-btn:hover { background: rgba(46, 125, 50, 0.15); color: white; }
    .nav-btn.active { background: #2e7d32; color: white; }
    .content { flex: 1; margin-left: 280px; padding: 30px; overflow: auto; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }
    .topbar h1 { font-size: 32px; display: flex; align-items: center; gap: 12px; }
    .topbar h1 i { color: #2e7d32; }
    .clock { background: white; padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 10px; }
    .form-card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 30px; }
    .form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    input { background: #f5f0e8; border: 1px solid #e0d6cc; padding: 14px; border-radius: 14px; }
    .upload-btn { background: #1a1a1a; color: white; border-radius: 14px; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
    .add-btn { background: #2e7d32; color: white; border: none; border-radius: 14px; padding: 14px; cursor: pointer; font-weight: 600; }
    .productos { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    .producto-card { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
    .producto-img { height: 160px; background-size: cover; background-position: center; background-color: #2e7d32; display: flex; align-items: center; justify-content: center; }
    .producto-img i { font-size: 50px; color: rgba(255,255,255,0.5); }
    .producto-content { padding: 20px; }
    .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; margin-bottom: 12px; color: white; }
    .stock-alto { background: #2e7d32; }
    .stock-medio { background: #f9a825; }
    .stock-bajo { background: #c62828; }
    .producto-content h3 { font-size: 18px; margin-bottom: 8px; }
    .info { margin-top: 6px; color: #666; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .costo { margin-top: 12px; font-size: 22px; color: #2e7d32; font-weight: 700; }
    .delete-btn { width: 100%; border: none; background: #c62828; color: white; padding: 10px; border-radius: 12px; margin-top: 12px; cursor: pointer; }
    .loading { text-align: center; padding: 50px; color: #888; grid-column: 1/-1; }
    @media (max-width: 768px) {
        .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; }
        .sidebar.open { transform: translateX(0); }
        .content { margin-left: 0; padding: 20px; }
    }
    .menu-toggle { display: none; position: fixed; top: 20px; left: 20px; z-index: 201; background: #2e7d32; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; font-size: 20px; cursor: pointer; }
    @media (max-width: 768px) { .menu-toggle { display: block; } }
</style>
</head>
<body>
<button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
<div class="sidebar">
    <div class="logo">SDN<br><span>Inventario</span></div>
    <div class="nav">
        <button class="nav-btn" onclick="location.href='dashboard.html'"><i class="fas fa-home"></i> Inicio</button>
        <button class="nav-btn" onclick="location.href='menus.html'"><i class="fas fa-utensils"></i> Menús</button>
        <button class="nav-btn" onclick="location.href='cuadre.html'"><i class="fas fa-chart-line"></i> Ventas</button>
        <button class="nav-btn active"><i class="fas fa-box"></i> Productos</button>
        <button class="nav-btn" onclick="location.href='asistencia.html'"><i class="fas fa-clock"></i> Asistencia</button>
    </div>
</div>
<div class="content">
    <div class="topbar">
        <h1><i class="fas fa-box"></i> Inventario de Productos</h1>
        <div class="clock"><i class="fas fa-calendar-alt"></i> <span id="fecha"></span> <i class="fas fa-clock"></i> <span id="hora"></span></div>
    </div>
    <div class="form-card">
        <div class="form">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="categoria" placeholder="Categoría">
            <input type="number" id="stock" placeholder="Stock" value="0">
            <input type="number" id="costo" placeholder="Costo RD$">
            <input type="text" id="suplidor" placeholder="Suplidor">
            <label class="upload-btn"><i class="fas fa-image"></i> Imagen <input type="file" id="imagen" hidden></label>
            <button class="add-btn" onclick="crearProducto()"><i class="fas fa-plus"></i> Agregar</button>
        </div>
    </div>
    <div class="productos" id="productos"><div class="loading">Cargando...</div></div>
</div>
<script>
    const API_URL = 'https://sdn-system.onrender.com';
    let productos = [];

    function actualizarHora() {
        const ahora = new Date();
        document.getElementById('fecha').innerHTML = ahora.toLocaleDateString('es-DO');
        document.getElementById('hora').innerHTML = ahora.toLocaleTimeString('es-DO');
    }
    setInterval(actualizarHora, 1000);
    actualizarHora();

    async function cargarProductos() {
        const contenedor = document.getElementById('productos');
        contenedor.innerHTML = '<div class="loading">Cargando...</div>';
        try {
            const response = await fetch(`${API_URL}/productos`);
            if (!response.ok) throw new Error('Error HTTP: ' + response.status);
            productos = await response.json();
            if (productos.length === 0) {
                contenedor.innerHTML = '<div class="loading">No hay productos</div>';
                return;
            }
            contenedor.innerHTML = '';
            productos.forEach(prod => {
                let stockClass = "stock-alto", stockText = "Stock Alto";
                if (prod.stock <= 5) { stockClass = "stock-bajo"; stockText = "¡Crítico!"; }
                else if (prod.stock <= 20) { stockClass = "stock-medio"; stockText = "Stock Bajo"; }
                const imgUrl = prod.imagen ? `${API_URL}/uploads/${prod.imagen}` : '';
                const card = document.createElement('div');
                card.className = 'producto-card';
                card.innerHTML = `
                    <div class="producto-img" style="${imgUrl ? `background-image: url('${imgUrl}')` : ''}">
                        ${!imgUrl ? '<i class="fas fa-box"></i>' : ''}
                    </div>
                    <div class="producto-content">
                        <div class="badge ${stockClass}">${stockText}: ${prod.stock}</div>
                        <h3>${escapeHtml(prod.nombre)}</h3>
                        <div class="info"><i class="fas fa-tag"></i> ${escapeHtml(prod.categoria) || '-'}</div>
                        <div class="info"><i class="fas fa-truck"></i> ${escapeHtml(prod.suplidor) || '-'}</div>
                        <div class="costo">RD$ ${prod.costo || 0}</div>
                        <button class="delete-btn" onclick="eliminarProducto(${prod.id})"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                `;
                contenedor.appendChild(card);
            });
            console.log(`✅ Mostrando ${productos.length} productos del inventario`);
        } catch (error) {
            contenedor.innerHTML = `<div class="loading">Error: ${error.message}</div>`;
            console.error(error);
        }
    }

    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

    async function crearProducto() {
        const nombre = document.getElementById('nombre').value;
        if (!nombre) { alert('Ingrese el nombre'); return; }
        const formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('categoria', document.getElementById('categoria').value);
        formData.append('stock', document.getElementById('stock').value || 0);
        formData.append('costo', document.getElementById('costo').value || 0);
        formData.append('suplidor', document.getElementById('suplidor').value);
        const img = document.getElementById('imagen').files[0];
        if (img) formData.append('imagen', img);
        try {
            await fetch(`${API_URL}/crear-producto`, { method: 'POST', body: formData });
            alert('Producto agregado');
            document.getElementById('nombre').value = '';
            document.getElementById('categoria').value = '';
            document.getElementById('stock').value = '0';
            document.getElementById('costo').value = '';
            document.getElementById('suplidor').value = '';
            document.getElementById('imagen').value = '';
            cargarProductos();
        } catch (error) { alert('Error: ' + error.message); }
    }

    async function eliminarProducto(id) {
        if (!confirm('¿Eliminar este producto?')) return;
        try {
            await fetch(`${API_URL}/eliminar-producto/${id}`, { method: 'DELETE' });
            alert('Producto eliminado');
            cargarProductos();
        } catch (error) { alert('Error: ' + error.message); }
    }

    document.getElementById('menuToggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('open');
    });

    cargarProductos();
</script>
</body>
</html>
