<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Empleados • SDN</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:'Poppins',sans-serif;
    background:#f5f1e8;
    display:flex;

}

/* SIDEBAR */

.sidebar{

    width:280px;
    background:#111;
    min-height:100vh;
    padding:25px;
    color:white;

}

.logo{

    font-size:32px;
    font-weight:700;
    color:#d9b382;
    margin-bottom:40px;

}

.logo span{

    color:#2e7d32;

}

.nav{

    display:flex;
    flex-direction:column;
    gap:12px;

}

.nav button{

    background:transparent;
    border:none;
    color:white;
    padding:18px;
    border-radius:16px;
    text-align:left;
    cursor:pointer;
    transition:0.3s;
    font-size:16px;

}

.nav button:hover{

    background:#2e7d32;

}

.active{

    background:#2e7d32 !important;

}

/* CONTENT */

.content{

    flex:1;
    padding:30px;

}

.top{

    margin-bottom:30px;

}

.top h1{

    font-size:36px;
    color:#111;

}

.top p{

    color:#555;
    margin-top:8px;

}

/* FORM */

.form{

    background:white;
    padding:25px;
    border-radius:25px;
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:15px;

}

.form input,
.form select{

    padding:16px;
    border:none;
    background:#f5f5f5;
    border-radius:14px;
    font-size:15px;

}

.form button{

    background:#2e7d32;
    color:white;
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-size:16px;

}

/* TABLE */

.table-container{

    background:white;
    padding:25px;
    border-radius:25px;
    margin-top:30px;
    overflow:auto;

}

table{

    width:100%;
    border-collapse:collapse;

}

th{

    background:#111;
    color:white;
    padding:16px;

}

td{

    padding:16px;
    border-bottom:1px solid #eee;

}

.estado{

    background:#2e7d32;
    color:white;
    padding:8px 15px;
    border-radius:12px;
    display:inline-block;

}

.delete-btn{

    background:#c62828;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;

}

</style>

</head>

<body>

<div class="sidebar">

    <div class="logo">

        🔥 SDN
        <span>Empleados</span>

    </div>

    <div class="nav">

        <button onclick="window.location.href='dashboard.html'">
            🏠 Inicio
        </button>

        <button class="active">
            👨‍🍳 Empleados
        </button>

    </div>

</div>

<div class="content">

    <div class="top">

        <h1>
            Gestión de Empleados
        </h1>

        <p>
            Administración del personal
        </p>

    </div>

    <div class="form">

        <input
            type="text"
            id="nombre"
            placeholder="Nombre"
        >

        <input
            type="text"
            id="usuario"
            placeholder="Usuario"
        >

        <input
            type="password"
            id="password"
            placeholder="Contraseña"
        >

        <input
            type="text"
            id="telefono"
            placeholder="Teléfono"
        >

        <input
            type="number"
            id="salario"
            placeholder="Salario"
        >

        <select id="rol">

            <option value="Empleado">
                Empleado
            </option>

            <option value="Administrador">
                Administrador
            </option>

            <option value="Cajero">
                Cajero
            </option>

        </select>

        <button onclick="crearEmpleado()">
            Agregar
        </button>

    </div>

    <div class="table-container">

        <table>

            <thead>

                <tr>

                    <th>Nombre</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Teléfono</th>
                    <th>Salario</th>
                    <th>Estado</th>
                    <th>Ingreso</th>
                    <th>Acción</th>

                </tr>

            </thead>

            <tbody id="tabla"></tbody>

        </table>

    </div>

</div>

<script>

async function crearEmpleado(){

    const response =
        await fetch(
            "http://localhost:3000/crear-empleado",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({

                    nombre:
                    document.getElementById(
                        "nombre"
                    ).value,

                    usuario:
                    document.getElementById(
                        "usuario"
                    ).value,

                    password:
                    document.getElementById(
                        "password"
                    ).value,

                    telefono:
                    document.getElementById(
                        "telefono"
                    ).value,

                    salario:
                    document.getElementById(
                        "salario"
                    ).value,

                    rol:
                    document.getElementById(
                        "rol"
                    ).value

                })
            }
        );

    const data =
        await response.json();

    alert(data.mensaje);

    cargarEmpleados();

}

async function cargarEmpleados(){

    const response =
        await fetch(
            "http://localhost:3000/empleados-completo"
        );

    const empleados =
        await response.json();

    const tabla =
        document.getElementById(
            "tabla"
        );

    tabla.innerHTML = "";

    empleados.forEach(emp => {

        tabla.innerHTML += `

        <tr>

            <td>${emp.nombre}</td>

            <td>${emp.usuario}</td>

            <td>${emp.rol}</td>

            <td>${emp.telefono || '-'}</td>

            <td>
                RD$ ${emp.salario || 0}
            </td>

            <td>

                <span class="estado">

                    ${emp.estado}

                </span>

            </td>

            <td>
                ${emp.fecha_ingreso || '-'}
            </td>

            <td>

                <button
                    class="delete-btn"
                    onclick="eliminarEmpleado(${emp.id})"
                >
                    Eliminar
                </button>

            </td>

        </tr>

        `;

    });

}

async function eliminarEmpleado(id){

    if(!confirm(
        "¿Eliminar empleado?"
    )) return;

    await fetch(
        `http://localhost:3000/eliminar-empleado/${id}`,
        {
            method:"DELETE"
        }
    );

    cargarEmpleados();

}

cargarEmpleados();

</script>

</body>
</html>
